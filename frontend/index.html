<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoPrint Pro — Passport & ID Photo Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    /* Basic reset and CSS variables */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #1a1a1c;
      --surface2: #242427;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0ede8;
      --muted: #888580;
      --accent: #c8f055;
      --danger: #ff5e5e;
      --radius: 12px;
      --radius-lg: 18px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header styles */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(14,14,15,0.92);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }
    .logo span { color: var(--text); }

    /* Layout grid */
    .layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      min-height: calc(100vh - 65px);
    }

    .main-col {
      padding: 32px 40px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
    }

    .side-col {
      padding: 28px 28px;
      overflow-y: auto;
      background: var(--surface);
    }

    /* Section titles */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .section { margin-bottom: 36px; }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .side-col { border-top: 1px solid var(--border); }
      header { padding: 16px 20px; }
      .main-col { padding: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Photo<span>Print</span> Pro</div>
    <div class="server-status" id="aiStatusBadge">
      <div class="status-dot" id="dot"></div>
      <span id="status-text">AI Ready</span>
    </div>
  </header>

  <div class="layout">
    <div class="main-col">
      <!-- Content will go here -->
    </div>
    <div class="side-col">
      <!-- Sidebar will go here -->
    </div>
  </div>
</body>
// Step 2: Add image upload with drag & drop support
// Add this script after the HTML structure

<script>
let images = []; // Array to store uploaded images

// DOM Elements
const fileInput = document.getElementById('fileInput');
const zone = document.getElementById('zone');
const imgGrid = document.getElementById('imgGrid');

// File upload handler
fileInput.addEventListener('change', (e) => loadFiles(Array.from(e.target.files)));

// Drag & drop handlers
zone.addEventListener('dragover', (e) => { 
  e.preventDefault(); 
  zone.classList.add('drag-over'); 
});

zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));

zone.addEventListener('drop', (e) => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  loadFiles(files);
});

function loadFiles(files) {
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      images.push({
        id: Date.now() + Math.random(),
        src: e.target.result,
        processed: e.target.result,
        name: file.name,
        bgDone: false
      });
      renderGrid();
      updateSummary();
    };
    reader.readAsDataURL(file);
  });
}

function renderGrid() {
  imgGrid.innerHTML = '';
  images.forEach((img, i) => {
    const card = document.createElement('div');
    card.className = 'img-card';
    card.innerHTML = `
      <img src="${img.processed}" />
      <button class="del" onclick="deleteImage(${i})">✕</button>
      <span class="state-badge raw">original</span>
    `;
    imgGrid.appendChild(card);
  });
}

function deleteImage(i) {
  images.splice(i, 1);
  renderGrid();
  updateSummary();
}

function updateSummary() {
  document.getElementById('sImgs').textContent = images.length;
}
// Step 3: Add photo size selection functionality

let photoSize = { w: 35, h: 45, name: 'Passport' };

function pickSize(el) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  photoSize = {
    w: parseFloat(el.dataset.w),
    h: parseFloat(el.dataset.h),
    name: el.dataset.name
  };
  updateSummary();
}

// Update summary with size info
function updateSummary() {
  document.getElementById('sImgs').textContent = images.length;
  document.getElementById('sSize').textContent = `${photoSize.w} × ${photoSize.h} mm`;
}
// Step 4: Add layout configuration (photos per page)

let layout = { total: 4, cols: 2, rows: 2 };

function pickLayout(el, total, cols, rows) {
  document.querySelectorAll('.lay-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  layout = { total, cols, rows };
  updateSummary();
}

function updateSummary() {
  document.getElementById('sImgs').textContent = images.length;
  document.getElementById('sSize').textContent = `${photoSize.w} × ${photoSize.h} mm`;
  document.getElementById('sLay').textContent = `${layout.total} per page`;
  
  const pagesNeeded = images.length > 0 ? Math.ceil(images.length / layout.total) : 0;
  document.getElementById('sPages').textContent = pagesNeeded || '—';
}

let selectedColor = '#ffffff';

function pickColor(el) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('sel'));
  el.classList.add('sel');
  selectedColor = el.dataset.color;
  const label = selectedColor === 'transparent' ? 'Transparent' : selectedColor;
  document.getElementById('colorLabel').textContent = `Selected: ${label}`;
}

function pickCustomColor(hex) {
  selectedColor = hex;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('sel'));
  document.querySelector('.swatch-custom').classList.add('sel');
  document.getElementById('colorLabel').textContent = `Selected: Custom (${hex})`;
}
<!-- Step 6: Add jsPDF library and basic PDF export -->

const { jsPDF } = window.jspdf;

function getPageMM() {
  const value = document.getElementById('pageSize').value;
  if (value === 'A4') return { w: 210, h: 297 };
  if (value === 'Letter') return { w: 216, h: 279 };
  return { w: 148, h: 210 };
}

async function generatePDF() {
  if (!images.length) {
    alert('Upload at least one image first');
    return;
  }

  const page = getPageMM();
  const pdf = new jsPDF({
    orientation: page.h > page.w ? 'portrait' : 'landscape',
    unit: 'mm',
    format: [page.w, page.h]
  });

  // Basic PDF generation
  pdf.save(`photoprint-${Date.now()}.pdf`);
  alert('PDF generated!');
}

function refreshPreview() {
  if (!images.length) return;
  const wrap = document.getElementById('prevWrap');
  wrap.innerHTML = '<canvas id="previewCanvas"></canvas>';
  drawPreview();
}

function drawPreview() {
  const canvas = document.getElementById('previewCanvas');
  if (!canvas) return;
  
  const page = getPageMM();
  const scale = 2.2; // Preview scale
  const border = document.getElementById('tBorder').classList.contains('on');
  
  canvas.width = page.w * scale;
  canvas.height = page.h * scale;
  const ctx = canvas.getContext('2d');
  
  // Draw white background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Calculate grid positions
  const pw = photoSize.w * scale;
  const ph = photoSize.h * scale;
  const gap = 3 * scale;
  const totalW = layout.cols * pw + (layout.cols - 1) * gap;
  const totalH = layout.rows * ph + (layout.rows - 1) * gap;
  const startX = (canvas.width - totalW) / 2;
  const startY = (canvas.height - totalH) / 2;
  
  // Draw placeholder rectangles
  for (let i = 0; i < layout.total && i < images.length; i++) {
    const row = Math.floor(i / layout.cols);
    const col = i % layout.cols;
    const x = startX + col * (pw + gap);
    const y = startY + row * (ph + gap);
    
    ctx.fillStyle = selectedColor;
    ctx.fillRect(x, y, pw, ph);
    ctx.strokeStyle = '#ddd';
    ctx.strokeRect(x, y, pw, ph);
  }
}
// Step 8: Add background removal API integration

const SERVER = 'http://localhost:5000';

async function checkServer() {
  const dot = document.getElementById('dot');
  const text = document.getElementById('status-text');
  try {
    const response = await fetch(`${SERVER}/health`, { signal: AbortSignal.timeout(3000) });
    if (response.ok) {
      dot.className = 'status-dot online';
      text.textContent = 'AI Ready';
      return true;
    }
  } catch {}
  dot.className = 'status-dot offline';
  text.textContent = 'AI Offline';
  return false;
}

async function removeBackgrounds() {
  if (!images.length) {
    alert('Upload images first');
    return;
  }

  const online = await checkServer();
  if (!online) {
    alert('Background removal server is offline');
    return;
  }

  const button = document.getElementById('removeBgBtn');
  button.disabled = true;
  button.textContent = 'Processing...';

  for (let i = 0; i < images.length; i++) {
    try {
      const response = await fetch(`${SERVER}/remove-bg`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image_base64: images[i].src })
      });
      
      const data = await response.json();
      if (data.success) {
        images[i].processed = data.image_base64;
        images[i].bgDone = true;
      }
    } catch (error) {
      console.error('Background removal failed:', error);
    }
  }

  button.disabled = false;
  button.textContent = '✨ Remove Backgrounds';
  renderGrid();
  refreshPreview();
}
let editorIdx = -1;
let edImg = null;
let edOffX = 0, edOffY = 0;
let edZoom = 1;
let edDragging = false;

function openEditor(index) {
  editorIdx = index;
  const img = images[index];
  edOffX = img.offsetX || 0;
  edOffY = img.offsetY || 0;
  edZoom = img.zoom || 1;
  
  document.getElementById('zoomSlider').value = Math.round(edZoom * 100);
  document.getElementById('zoomVal').textContent = `${Math.round(edZoom * 100)}%`;
  
  const canvas = document.getElementById('editorCanvas');
  const aspect = photoSize.h / photoSize.w;
  canvas.width = 420;
  canvas.height = Math.round(420 * aspect);
  
  edImg = new Image();
  edImg.onload = () => drawEditor();
  edImg.src = img.processed;
  
  document.getElementById('editorModal').style.display = 'flex';
}

function drawEditor() {
  const canvas = document.getElementById('editorCanvas');
  const ctx = canvas.getContext('2d');
  if (!edImg) return;
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw background
  ctx.fillStyle = selectedColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw image with zoom and offset
  const baseScale = Math.min(canvas.width / edImg.width, canvas.height / edImg.height);
  const scale = baseScale * edZoom;
  const drawW = edImg.width * scale;
  const drawH = edImg.height * scale;
  const cx = canvas.width / 2 + edOffX;
  const cy = canvas.height / 2 + edOffY;
  
  ctx.drawImage(edImg, cx - drawW/2, cy - drawH/2, drawW, drawH);
  
  // Draw crop frame
  ctx.strokeStyle = '#c8f055';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 5]);
  ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
}

function applyPosition() {
  if (editorIdx < 0) return;
  
  images[editorIdx].offsetX = edOffX;
  images[editorIdx].offsetY = edOffY;
  images[editorIdx].zoom = edZoom;
  
  closeEditor();
  renderGrid();
  refreshPreview();
}
</script>
</html>
